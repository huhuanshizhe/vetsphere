<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gear Partner - Supplier Backend Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .header h1 {
            font-size: 18px;
            font-weight: 600;
        }
        
        .header .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .iframe-container {
            height: calc(100vh - 56px);
            background: white;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .controls {
            display: flex;
            gap: 12px;
        }
        
        .btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        
        .btn:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #666;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e5e5e5;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔧 Gear Partner - Supplier Backend</h1>
        <div class="status">
            <div class="status-dot"></div>
            <span>Connected to http://localhost:3004</span>
        </div>
        <div class="controls">
            <button class="btn" onclick="refreshFrame()">🔄 刷新</button>
            <button class="btn" onclick="openInNewTab()">🔗 新窗口打开</button>
        </div>
    </div>
    
    <div class="iframe-container">
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <div>正在加载 Gear Partner 供应商后台...</div>
        </div>
        <iframe 
            id="previewFrame" 
            src="http://localhost:3004" 
            onload="document.getElementById('loading').style.display='none'"
            title="Gear Partner Preview"
        ></iframe>
    </div>
    
    <script>
        function refreshFrame() {
            const frame = document.getElementById('previewFrame');
            frame.src = frame.src;
        }
        
        function openInNewTab() {
            window.open('http://localhost:3004', '_blank');
        }
        
        // Auto-hide loading after 5 seconds
        setTimeout(() => {
            const loading = document.getElementById('loading');
            if (loading) loading.style.opacity = '0.5';
        }, 5000);
    </script>
</body>
</html>
