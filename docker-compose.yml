# ============================================
# VetSphere Docker Compose Configuration
# ============================================
# 
# 使用方法:
# 1. 复制 .env.example 到 .env 并填写配置
# 2. 构建所有镜像: docker-compose build
# 3. 启动所有服务: docker-compose up -d
# 4. 查看日志: docker-compose logs -f
# 5. 停止服务: docker-compose down
#
# 端口分配:
# - cn:           3001 (中文站)
# - intl:         3002 (国际站)
# - admin:        3003 (管理后台)
# - gear-partner: 3004 (设备供应商后台)
# - edu-partner:  3005 (教育合作方后台)
# - nginx:        80/443 (反向代理)

version: '3.8'

services:
  # ==========================================
  # VetSphere CN - 中文站
  # ==========================================
  vetsphere-cn:
    build:
      context: .
      dockerfile: apps/cn/Dockerfile
    container_name: vetsphere-cn
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - NEXT_PUBLIC_SITE_URL=https://cn.vetsphere.com
      - ALIPAY_APP_ID=${ALIPAY_APP_ID}
      - ALIPAY_PRIVATE_KEY=${ALIPAY_PRIVATE_KEY}
      - ALIPAY_PUBLIC_KEY=${ALIPAY_PUBLIC_KEY}
      - WECHAT_PAY_APP_ID=${WECHAT_PAY_APP_ID}
      - WECHAT_PAY_MCH_ID=${WECHAT_PAY_MCH_ID}
      - WECHAT_PAY_API_KEY=${WECHAT_PAY_API_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
    networks:
      - vetsphere-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==========================================
  # VetSphere INTL - 国际站
  # ==========================================
  vetsphere-intl:
    build:
      context: .
      dockerfile: apps/intl/Dockerfile
    container_name: vetsphere-intl
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - NEXT_PUBLIC_SITE_URL=https://intl.vetsphere.com
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - AIRWALLEX_CLIENT_ID=${AIRWALLEX_CLIENT_ID}
      - AIRWALLEX_API_KEY=${AIRWALLEX_API_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
    networks:
      - vetsphere-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==========================================
  # VetSphere Admin - 管理后台
  # ==========================================
  vetsphere-admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    container_name: vetsphere-admin
    restart: unless-stopped
    ports:
      - "3003:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - NEXT_PUBLIC_SITE_URL=https://admin.vetsphere.com
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
    networks:
      - vetsphere-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==========================================
  # VetSphere Gear Partner - 设备供应商后台
  # ==========================================
  vetsphere-gear-partner:
    build:
      context: .
      dockerfile: apps/gear-partner/Dockerfile
    container_name: vetsphere-gear-partner
    restart: unless-stopped
    ports:
      - "3004:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - NEXT_PUBLIC_SITE_URL=https://gear.vetsphere.com
      - RESEND_API_KEY=${RESEND_API_KEY}
    networks:
      - vetsphere-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==========================================
  # VetSphere Edu Partner - 教育合作方后台
  # ==========================================
  vetsphere-edu-partner:
    build:
      context: .
      dockerfile: apps/edu-partner/Dockerfile
    container_name: vetsphere-edu-partner
    restart: unless-stopped
    ports:
      - "3005:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - NEXT_PUBLIC_SITE_URL=https://edu.vetsphere.com
      - RESEND_API_KEY=${RESEND_API_KEY}
    networks:
      - vetsphere-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==========================================
  # Nginx 反向代理
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: vetsphere-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/nginx/ssl:/etc/nginx/ssl:ro
      - ./deploy/nginx/logs:/var/log/nginx
    depends_on:
      - vetsphere-cn
      - vetsphere-intl
      - vetsphere-admin
      - vetsphere-gear-partner
      - vetsphere-edu-partner
    networks:
      - vetsphere-network

networks:
  vetsphere-network:
    driver: bridge

